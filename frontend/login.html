<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · Vesta</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-login-body" data-page="login">

<div data-fx-nav></div>

<header class="page-header">
  <div class="container">
    <div class="breadcrumb-link"><a href="/">Home</a> / <span>Sign in</span></div>
    <h1>Sign in with Google</h1>
    <p class="text-muted-soft mb-0">Checkout, track orders, and manage the store with your Google account.</p>
  </div>
</header>

<section class="py-5 bg-cream">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="checkout-card auth-login-card">
          <h3 class="mb-2">Welcome back</h3>
          <p class="text-muted-soft small mb-4">
            We use Google Sign-In — no new password. Your email is only used to match orders
            to your account.
          </p>
          <div id="vestaLoginGoogle" class="d-flex justify-content-center flex-wrap"></div>
          <p class="text-muted-soft small text-center mt-4 mb-0">
            <a href="/" class="text-forest">← Back to shopping</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>

<div data-fx-footer></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js?v=vesta1"></script>
<script src="/js/auth.js?v=vesta1"></script>
<script src="/js/cart.js?v=vesta1"></script>
<script src="/js/layout.js?v=vesta1"></script>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const next = params.get('next') || '/';
  const mount = document.getElementById('vestaLoginGoogle');

  VestaAuth.whoami().then(function () {
    if (VestaAuth.getUser()) {
      try {
        if (next.startsWith('/') && !next.startsWith('//')) {
          location.replace(next);
        } else {
          location.replace('/');
        }
      } catch (_) {
        location.replace('/');
      }
      return;
    }
    if (!mount) return;
    VestaAuth.renderSignInButton(mount, {
      onSuccess: function () {
        var dest = next;
        try {
          if (dest && dest.startsWith('/') && !dest.startsWith('//')) {
            location.replace(dest);
            return;
          }
        } catch (e) {}
        location.replace('/');
      },
    });
  });
})();
</script>
</body>
</html>

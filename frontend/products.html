<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- FX_SEO -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="manifest" href="/site.webmanifest" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="products">

<div data-fx-nav></div>

<header class="page-header">
  <div class="container">
    <div class="breadcrumb-link"><a href="/">Home</a> / <span id="crumbTail">Shop</span></div>
    <h1 id="pageTitle">The Collection</h1>
    <p class="text-muted-soft mb-0" id="pageSub">Heirloom pieces, built one at a time.</p>
  </div>
</header>

<section class="py-5 bg-cream">
  <div class="container">
    <div class="filter-bar">
      <strong class="me-2">Category</strong>
      <button class="filter-chip" data-filter="category" data-value="">All</button>
      <button class="filter-chip" data-filter="category" data-value="beds">Beds</button>
      <button class="filter-chip" data-filter="category" data-value="sofas">Sofas</button>
      <button class="filter-chip" data-filter="category" data-value="tables">Tables</button>
      <button class="filter-chip" data-filter="category" data-value="chairs">Chairs</button>
      <button class="filter-chip" data-filter="category" data-value="storage">Storage</button>

      <div class="vr mx-2 d-none d-md-block"></div>

      <strong class="me-2">Wood</strong>
      <button class="filter-chip" data-filter="wood" data-value="">All</button>
      <button class="filter-chip" data-filter="wood" data-value="Teak">Teak</button>
      <button class="filter-chip" data-filter="wood" data-value="Sheesham">Sheesham</button>
      <button class="filter-chip" data-filter="wood" data-value="Mango">Mango</button>

      <div class="ms-auto">
        <input type="search" id="searchInput" class="form-control form-control-sm" placeholder="Search..." style="min-width: 220px" />
      </div>
    </div>

    <div id="resultCount" class="text-muted-soft small mb-3"></div>
    <div class="row g-4" id="grid"></div>
    <div id="emptyState" class="text-center text-muted-soft py-5" style="display:none">
      <p class="mb-1">No products match these filters.</p>
      <button class="btn btn-outline-forest" id="resetBtn">Reset filters</button>
    </div>
  </div>
</section>

<div data-fx-footer></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js?v=vesta1"></script>
<script src="/js/cart.js?v=vesta1"></script>
<script src="/js/layout.js?v=vesta1"></script>
<script src="/js/products.js?v=vesta1"></script>
</body>
</html>
